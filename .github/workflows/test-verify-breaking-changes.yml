# Temporary workflow for testing verify-breaking-changes.yml before merge.
# Update the default release_tag below to an already-published version before pushing this branch.
# Remove this workflow after the reusable workflow has been validated.
name: Test verify breaking changes

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: The already-published fmu-datamodels version to verify downstream.
        required: true
        type: string
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/verify-breaking-changes.yml
      - .github/workflows/test-verify-breaking-changes.yml

permissions:
  contents: read

jobs:
  verify-breaking-changes:
    uses: ./.github/workflows/verify-breaking-changes.yml
    with:
      release_tag: ${{ github.event.inputs.release_tag || '0.21.0' }}
    secrets: inherit
